<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审查报告 - CodeGuardian AI</title>
    <style>
        html, body { height: 100%; margin: 0; background: #0d1117; }
        .report-frame { width: 100%; height: 100%; border: 0; display: block; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <iframe class="report-frame" th:src="@{'/api/report/' + ${taskId} + '/html'}" title="审查报告"></iframe>
    <script>
        // 防止iframe加载失败时的回退
        (function(){
            var f = document.querySelector('.report-frame');
            f.addEventListener('error', function(){
                alert('报告加载失败，请稍后重试');
            });
        })();
    </script>
    
</body>
</html>
