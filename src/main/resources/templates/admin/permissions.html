<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限列表 - CodeGuardian AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-container">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-shield-alt"></i></div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard" title="仪表盘"><i class="fas fa-chart-pie"></i></a></li>
                <li th:if="${canReview or canQuery}"><a href="/review" title="搜索"><i class="fas fa-search"></i></a></li>
                <li th:if="${canQuery}"><a href="/review/reports" title="任务列表"><i class="fas fa-file-lines"></i></a></li>
                <li th:if="${canAdmin}"><a href="/admin/users" class="active" title="权限管理"><i class="fas fa-user-shield"></i></a></li>
                <li th:if="${canAdmin}"><a href="/admin/knowledge" title="知识库管理"><i class="fas fa-book"></i></a></li>
                <li th:if="${canConfig}"><a href="/admin/settings" title="设置"><i class="fas fa-cog"></i></a></li>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-header">
                <h1 class="page-title">权限管理</h1>
                <div class="user-section">
                    <div class="user-info">
                        <span class="user-label" th:text="${roleName ?: '系统管理员'}">系统管理员</span>
                        <span class="username" th:text="${username ?: 'ADMIN'}">ADMIN</span>
                    </div>
                    <div class="user-avatar" id="user-avatar" th:text="${avatarChar ?: '系'}">系</div>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> 登出
                    </button>
                </div>
            </header>

            <!-- 内容区域容器 -->
            <div class="content-wrapper">
                <!-- 二级菜单面板 -->
                <aside class="submenu-panel">
                    <nav class="submenu-nav">
                        <a th:if="${canAdmin}" href="/admin/users" class="submenu-item">
                            <i class="fas fa-users"></i>
                            <span>用户管理</span>
                        </a>
                        <a th:if="${canAdmin}" href="/admin/roles" class="submenu-item">
                            <i class="fas fa-user-tag"></i>
                            <span>角色管理</span>
                        </a>
                        <a th:if="${canConfig}" href="/admin/permissions" class="submenu-item active">
                            <i class="fas fa-key"></i>
                            <span>权限列表</span>
                        </a>
                    </nav>
                </aside>

                <!-- 内容区域 -->
                <div class="content-panel">
                    <div class="content-area">
                        <div class="content-window">
                            <h2 class="content-title">权限列表</h2>
                            <div id="permissionsContent" class="permissions-grid">
                                <!-- 动态加载 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/http.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
